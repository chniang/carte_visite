<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarteViz — Paiement confirmé ✅</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --card: #13131f;
    --border: #1e1e35;
    --accent: #a78bfa;
    --accent2: #818cf8;
    --green: #34d399;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(52,211,153,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--card);
    border: 1px solid rgba(52,211,153,0.3);
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-circle {
    width: 80px;
    height: 80px;
    background: rgba(52,211,153,0.1);
    border: 2px solid rgba(52,211,153,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
    animation: pop 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 12px;
    color: var(--green);
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .plan-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 32px;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--border);
    color: var(--muted);
  }

  .btn-secondary:hover { color: var(--text); }

  .note {
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="card">
  <div class="check-circle">✅</div>
  <h1>Paiement confirmé !</h1>
  <p class="subtitle">Merci pour votre confiance.<br>Votre plan a été activé sur votre carte CarteViz.</p>

  <div class="plan-badge" id="planBadge">⭐ Plan Pro activé</div>

  <div class="actions">
    <a href="#" class="btn btn-primary" id="btnCarte">📊 Voir mon dashboard</a>
    <a href="index_saas.html" class="btn btn-secondary">🏠 Retour à l'accueil</a>
  </div>

  <p class="note" id="noteText">
    Votre dashboard analytics est maintenant accessible.<br>
    Consultez vos statistiques de vues, clics et visiteurs.
  </p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || params.get('ref_command') || '';
  const token = params.get('owner') || '';

  // Essayer de récupérer le slug depuis ref_command (format: slug_timestamp)
  let realSlug = slug;
  if (slug.includes('_')) {
    realSlug = slug.split('_').slice(0, -1).join('_');
  }

  if (realSlug) {
    const carteUrl = 'carte.html?slug=' + realSlug + (token ? '&owner=' + token : '');
    document.getElementById('btnCarte').href = carteUrl;
  }

  // Adapter le message selon le plan
  const plan = params.get('plan') || '';
  if (plan === 'lifetime') {
    document.getElementById('planBadge').textContent = '🔥 Plan À Vie activé';
    document.getElementById('noteText').innerHTML = 
      'Accès illimité à vie activé sur votre carte.<br>Bienvenue parmi les membres fondateurs CarteViz !';
  }
</script>
</body>
</html>
